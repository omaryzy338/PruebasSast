rules:
  - id: hardcoded-password-java
    pattern-regex: 'String\s+\w+\s*=\s*".+"'
    message: "Hardcoded password detectado en Java: usa variables de entorno o gestores de secretos."
    severity: WARNING
    languages: [java]

  - id: command-injection-java
    pattern: Runtime.getRuntime().exec($X)
    message: "Posible Command Injection en Java: evita ejecutar comandos con entradas externas."
    severity: ERROR
    languages: [java]

  - id: sql-injection-java
    pattern-either:
      - pattern: $ST.executeQuery($X)
      - pattern: $ST.executeUpdate($X)
    message: "Posible SQL Injection en Java: evita concatenar cadenas en consultas."
    severity: ERROR
    languages: [java]